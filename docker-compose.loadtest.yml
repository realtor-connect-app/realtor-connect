x-realtor-server-environment: &realtor-server-environment
  SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
  SPRING_CLOUD_CONFIG_PROFILE: local
  POSTGRES_HOST: postgres:5432
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  KAFKA_BOOTSTRAP_SERVERS: kafka:29092
  CDN_CLIENT: placeholder
  ACTUATOR_SHOW_VALUES: NEVER
  APP_DOMAIN: http://localhost:8080

services:
  postgres:
    image: postgres:15.0
    environment:
      POSTGRES_DB: realtor-connect
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d realtor-connect"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init:
    image: confluentinc/cp-kafka:7.6.1
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - sh
      - -c
      - |
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic emails --partitions 20 --replication-factor 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "9093:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "8025:8025"

  config-server:
    build:
      context: .
      args:
        MODULE: config-server
    environment:
      SPRING_PROFILES_ACTIVE: native
      SPRING_CLOUD_CONFIG_SERVER_NATIVE_SEARCH_LOCATIONS: file:/config/local
    ports:
      - "8888:8888"
    volumes:
      - ./docker/config/local:/config/local:ro

  operational-service:
    build:
      context: .
      args:
        MODULE: realtor-connect-server
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      config-server:
        condition: service_started
    environment:
      <<: *realtor-server-environment
      SPRING_APPLICATION_NAME: operational-service

  user-service:
    build:
      context: .
      args:
        MODULE: realtor-connect-server
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      config-server:
        condition: service_started
    environment:
      <<: *realtor-server-environment
      SPRING_APPLICATION_NAME: user-service

  real-estate-service:
    build:
      context: .
      args:
        MODULE: realtor-connect-server
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      config-server:
        condition: service_started
    environment:
      <<: *realtor-server-environment
      SPRING_APPLICATION_NAME: real-estate-service

  email-service:
    build:
      context: .
      args:
        MODULE: email-service
    restart: on-failure
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      config-server:
        condition: service_started
      mailhog:
        condition: service_started
    environment:
      SPRING_APPLICATION_NAME: email-service
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      SPRING_CLOUD_CONFIG_PROFILE: local
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EMAIL_DEBUG_HOST: mailhog
      EMAIL_DEBUG_PORT: 1025
      ACTUATOR_SHOW_VALUES: NEVER

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - operational-service
      - user-service
      - real-estate-service
    ports:
      - "8080:8080"
    volumes:
      - ./docker/nginx/loadtest.conf:/etc/nginx/nginx.conf:ro

  prometheus:
    image: prom/prometheus:v2.55.1
    depends_on:
      - operational-service
      - user-service
      - real-estate-service
      - email-service
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:11.3.1
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  k6:
    image: grafana/k6:0.54.0
    profiles:
      - load
    depends_on:
      - gateway
    environment:
      BASE_URL: http://gateway:8080
      MAILHOG_URL: http://mailhog:8025
      RESULTS_DIR: /results
    command: run /scripts/scenarios/smoke.js
    volumes:
      - ./load-tests/k6:/scripts:ro
      - ./load-tests/results:/results

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
