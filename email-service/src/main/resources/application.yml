spring:
  application:
    name: email-service

management:
  show-values: ${ACTUATOR_SHOW_VALUES:NEVER}
  metrics:
    tags:
      application: ${spring.application.name}
    enable:
      jvm: true
      system: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    env:
      show-values: ${management.show-values}
    configprops:
      show-values: ${management.show-values}

email:
  server:
    credentials:
      username: ${EMAIL_USERNAME:''}
      password: ${EMAIL_PASSWORD:''}
    network:
      host: smtp.gmail.com
      port: 587
    properties:
      mail.protocol: smtp
      mail.test-connection: true
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  debugMode:
    enabled: false
    from: info@realtorconnect.com
    server:
      credentials:
        username: user
        password: user
      network:
        host: localhost
        port: 1025
  processor:
    processing-delay-ms: 1000
    batch-size: 10
