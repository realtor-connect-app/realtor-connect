spring:
  application:
    name: email-service
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: email-service
      auto-offset-reset: earliest
      enable-auto-commit: false

server:
  port: 8090

management:
  show-values: ${ACTUATOR_SHOW_VALUES:NEVER}
  metrics:
    tags:
      application: ${spring.application.name}
    enable:
      jvm: true
      system: true
    data:
      repository:
        autotime:
          enabled: true
          percentiles-histogram: true
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    env:
      show-values: ${management.show-values}
    configprops:
      show-values: ${management.show-values}

email:
  server:
    credentials:
      username: ${EMAIL_USERNAME:''}
      password: ${EMAIL_PASSWORD:''}
    network:
      host: smtp.gmail.com
      port: 587
    properties:
      mail.protocol: smtp
      mail.test-connection: true
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
  debugMode:
    enabled: true
    from: info@realtorconnect.com
    server:
      credentials:
        username: user
        password: user
      network:
        host: ${EMAIL_DEBUG_HOST:localhost}
        port: ${EMAIL_DEBUG_PORT:1025}
  processor:
    processing-delay-ms: 1000
    batch-size: 10

kafka.topics:
    emails:
      name: emails
      concurrency: 5
      error-handler:
        delay-ms: 100
        max-attempts: 1
